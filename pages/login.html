<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreakUp - Login</title>
    <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
    
    <div class="auth-wrap">
      <div class="auth-card">

        <!-- Logo -->
         <div class="flex items-c gap-10 mb-24" style="justify-content: center;">
            <div class="logo-icon" style="width: 42px; height: 42; border-radius:13px ;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" stroke-width="1.8" stroke-linecap = "round"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 3z"/></svg>
            </div>
            <div>
                <div class="fw-8 fs-18" style="letter-spacing: -0.5px;">StreakUp</div>
                <div class="fs-10 clr-dim uppercase tracking">Wellness Tracker</div>
            </div>
         </div>

         <!-- Tabs -->
         <div class="tab-bar">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
         </div>

         <!-- Error / Success-->
         <div id="error-box" class="error-box hidden">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
           <span id="error-msg" class="fs-13 fw-6" style="color: #e63946;"></span>
         </div>

         <!-- Name (signup only) -->
          <div id="name-wrap" class="field-wrap hidden">
            <span class="field-ico">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2e2e45" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input class="field" type="text" id="name" placeholder="Full name"/>
          </div>

          <!-- Email -->
           <div class="field-wrap">
              <span class="field-ico">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2e2e45" stroke-width="1.8" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input class="field" type="email" id="email" placeholder="Email address"/>
           </div>

           <!-- Password -->
           <div class="field-wrap mb-16">
             <span class="field-ico">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2e2e45" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
             </span>
             <input class="field" type="password" id="password" placeholder="Password"/>
             <button class="field-eye" onclcik="togglePass()" title="Toggle password">
                 <svg id="eye-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
             </button>
            </div>

            <!-- Forgot -->
            <div id="forgot-wrap" class="text-r mb-20">
                <span onclick="showForgot()" class="fs-12 fw-6 clr-orange" style="cursor:pointer ;">Forgot password?</span>
            </div>

            <!-- Submit -->
            <button class="auth-btn" id="submit-btn" onclick="handleSubmit()">
                <span id="btn-txt">Sign In</span>
                <svg id="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
            </button>

            <!-- Divider -->
             <div class="flex-items-c gap-10 mb-16">
                <div class="divider" style="flex:1;margin: 0;"></div>
                <span class="fs-11 clr-dim fw-7" style="letter-spacing:1.5px">OR</span>
                <div class="divider" style="flex:1;margin:0;"></div>
             </div>

             <!-- Google Button-->
              <button class="btn btn-ghost btn-full mb-16" onclick="googleLogin()">
                <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
              </button>

              <!--Switch -->
              <div id="switch-txt" class="text-c fs-13 clr-muted">
                Don't have an account?
                <span class="clr-orange fw-7" style="cursor:pointer;" onclick="switchTab('signup')">Sign Up free</span>
              </div>

      </div>
    </div>
    
<script src="../js/login.js"></script>    
</body>
</html>
